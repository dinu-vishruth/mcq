<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCQ Generator — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
  <div class="login-container">
    <div class="card glass-card">
      <div class="logo-badge">🧠</div>
      <h2>MCQ Generator</h2>
      <p class="subtitle">AI-Powered Question Generation</p>
      {% if error %}<div class="error-toast">{{ error }}</div>{% endif %}
      <form action="/login" method="post">
        <div class="input-group">
          <input type="text" name="username" placeholder="Username" required id="username-input">
        </div>
        <div class="input-group">
          <input type="password" name="password" placeholder="Password" required id="password-input"
            style="width: 100%; padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid rgba(148, 163, 184, 0.15); background: rgba(15, 23, 42, 0.6); color: #e2e8f0; font-family: inherit;">
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Log In</button>
      </form>
      <div class="divider">
        <span>OR</span>
      </div>
      <a href="/signup" class="btn btn-secondary" style="width: 100%; justify-content: center;">Create Account</a>
    </div>
  </div>
</body>

</html>
