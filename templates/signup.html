<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Generator — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="login-container">
        <div class="card glass-card">
            <div class="logo-badge">📝</div>
            <h2>Create Account</h2>
            <p class="subtitle">Join to create or take quizzes</p>
            {% if error %}<div class="error-toast">{{ error }}</div>{% endif %}
            <form action="/signup" method="post">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Choose a password" required
                        style="width: 100%; padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid rgba(148, 163, 184, 0.15); background: rgba(15, 23, 42, 0.6); color: #e2e8f0; font-family: inherit;">
                </div>
                <div class="input-group">
                    <select name="role" required>
                        <option value="">Select your role</option>
                        <option value="teacher">👨‍🏫 Teacher</option>
                        <option value="student">👨‍🎓 Student</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>
            <div class="divider">
                <span>Already have an account?</span>
            </div>
            <a href="/" class="btn btn-secondary" style="width: 100%; justify-content: center;">Log In</a>
        </div>
    </div>
</body>

</html>
